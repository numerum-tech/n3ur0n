<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>N3UR0N</title>
    <link rel="stylesheet" href="/ui/style.css">
</head>
<body>
    <aside class="sidebar" id="sidebar-main">
        <header class="sidebar-header">
            <div class="header-row">
                <h1>N3UR0N</h1>
                <button id="settings-open" class="header-icon" type="button" title="Settings" aria-label="Settings">⚙</button>
            </div>
            <code id="self-id" class="self-id" title="local instance id">…</code>
        </header>
        <nav class="sidebar-tabs" role="tablist">
            <button class="tab active" data-tab="chats" type="button">Chats</button>
            <button class="tab" data-tab="network" type="button">Network</button>
            <button class="tab" data-tab="skills" type="button">Skills</button>
        </nav>
        <section class="tab-panel" data-panel="chats">
            <button id="new-chat" type="button" class="primary">+ New chat</button>
            <ul id="conv-list" class="conv-list"></ul>
        </section>
        <section class="tab-panel hidden" data-panel="network">
            <div class="panel-toolbar">
                <input id="network-filter" type="search" class="filter" placeholder="filter peers · id / endpoint / cap…" />
                <button id="network-refresh" type="button" class="icon-btn" title="Refresh">⟳</button>
            </div>
            <div id="network-stats" class="panel-stats"></div>
            <ul id="network-list" class="compact-list"></ul>
        </section>
        <section class="tab-panel hidden" data-panel="skills">
            <div class="panel-toolbar">
                <input id="skills-filter" type="search" class="filter" placeholder="filter skills · name / tag / lang…" />
                <button id="skills-refresh" type="button" class="icon-btn" title="Refresh">⟳</button>
            </div>
            <div id="skills-stats" class="panel-stats"></div>
            <ul id="skills-list" class="compact-list"></ul>
        </section>
    </aside>

    <!-- Settings sidebar: swapped in when ⚙ is clicked. Contains its own
         tab nav (Backends / Caps / Gateways) and an exit button to
         return to the main sidebar. -->
    <aside class="sidebar hidden" id="sidebar-settings">
        <header class="sidebar-header">
            <div class="header-row">
                <button id="settings-back" class="header-icon" type="button" title="Back" aria-label="Back">←</button>
                <h1>Settings</h1>
                <span style="width: 28px;"></span>
            </div>
        </header>
        <nav class="sidebar-tabs" role="tablist">
            <button class="tab active" data-stab="backends" type="button">Backends</button>
            <button class="tab" data-stab="caps" type="button">Caps</button>
            <button class="tab" data-stab="gateways" type="button">Gateways</button>
        </nav>
        <section class="tab-panel" data-spanel="backends">
            <div class="panel-toolbar">
                <button id="settings-add-backend" type="button" class="primary" style="margin: 0;">+ Backend</button>
                <button id="settings-refresh-backends" type="button" class="icon-btn" title="Refresh">⟳</button>
            </div>
            <div id="settings-backends-stats" class="panel-stats"></div>
            <ul id="settings-backends-list" class="compact-list"></ul>
        </section>
        <section class="tab-panel hidden" data-spanel="caps">
            <div class="panel-toolbar">
                <button id="settings-refresh-caps" type="button" class="icon-btn" title="Refresh">⟳</button>
            </div>
            <div id="settings-caps-stats" class="panel-stats"></div>
            <ul id="settings-caps-list" class="compact-list"></ul>
        </section>
        <section class="tab-panel hidden" data-spanel="gateways">
            <div class="panel-toolbar">
                <button id="settings-add-gateway" type="button" class="primary" style="margin: 0;">+ Gateway</button>
                <button id="settings-refresh-gateways" type="button" class="icon-btn" title="Refresh">⟳</button>
            </div>
            <div id="settings-gateways-stats" class="panel-stats"></div>
            <ul id="settings-gateways-list" class="compact-list"></ul>
        </section>
    </aside>

    <main class="main-pane">
        <header class="main-header">
            <h2 id="conv-title">No conversation</h2>
            <div class="actions">
                <button id="rename" type="button" disabled>Rename</button>
                <button id="delete" type="button" disabled>Delete</button>
            </div>
        </header>

        <section id="conversation" class="conversation">
            <p class="empty-hint">Pick a conversation in the sidebar or click <strong>+ New chat</strong>.</p>
        </section>

        <section class="composer">
            <textarea id="prompt" rows="3" placeholder="Type your message and press Enter (Shift+Enter = newline)…" disabled></textarea>
            <button id="send" type="button" disabled>Send</button>
        </section>

        <!-- Inspector: overlays the chat when a peer or cap is opened from the sidebar. -->
        <section id="inspector" class="inspector hidden" aria-hidden="true">
            <header class="inspector-header">
                <button id="inspector-back" type="button" class="inspector-back" title="Back to chat">←</button>
                <h2 id="inspector-title">…</h2>
                <button id="inspector-close" type="button" class="inspector-close" title="Close">×</button>
            </header>
            <div id="inspector-body" class="inspector-body"></div>
        </section>
    </main>

    <script src="/ui/app.js" defer></script>
</body>
</html>
