<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>N3UR0N — chat</title>
    <link rel="stylesheet" href="/ui/style.css">
</head>
<body>
    <header>
        <h1>N3UR0N</h1>
        <div class="meta">
            <span class="label">self:</span>
            <code id="self-id">…</code>
        </div>
    </header>

    <main>
        <section class="controls">
            <label>
                Peer
                <select id="peer-select">
                    <option value="">(loading…)</option>
                </select>
            </label>
            <button id="refresh-peers" type="button">refresh</button>
            <span id="peer-cap" class="hint"></span>
        </section>

        <section class="conversation" id="conversation"></section>

        <section class="composer">
            <textarea id="prompt" rows="3" placeholder="Type a prompt and press ⌘/Ctrl+Enter…"></textarea>
            <button id="send" type="button">Send</button>
        </section>
    </main>

    <script src="/ui/app.js" defer></script>
</body>
</html>
