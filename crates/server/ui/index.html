<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>N3UR0N — chat</title>
    <link rel="stylesheet" href="/ui/style.css">
</head>
<body>
    <header>
        <h1>N3UR0N</h1>
        <div class="meta">
            <span class="label">self:</span>
            <code id="self-id">…</code>
        </div>
    </header>

    <main>
        <section class="controls">
            <label>
                Peer
                <select id="peer-select">
                    <option value="">(loading…)</option>
                </select>
            </label>
            <label>
                Capability
                <select id="cap-select" disabled>
                    <option value="">(no peer)</option>
                </select>
            </label>
            <button id="refresh-peers" type="button" title="reload directory">refresh list</button>
            <button id="discover-chat" type="button" title="cascade-discover peers offering `chat`">discover chat</button>
            <button id="clear-conv" type="button" title="reset conversation history">clear</button>
            <span id="peer-cap" class="hint"></span>
        </section>

        <section class="conversation" id="conversation"></section>

        <section class="composer" id="composer">
            <!-- Populated dynamically by app.js based on selected capability. -->
        </section>
    </main>

    <script src="/ui/app.js" defer></script>
</body>
</html>
