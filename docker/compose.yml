# 3-node N3UR0N test cluster.
#
# Usage:
#   docker compose -f docker/compose.yml up --build
#   docker compose -f docker/compose.yml exec node-a \
#       n3ur0n send --endpoint http://node-b:4242 --verb ping
#
# Each node has its own persistent volume so its identity survives restarts.

name: n3ur0n-cluster

x-node: &node
  build:
    context: ..
    dockerfile: docker/Dockerfile
  image: n3ur0n:dev
  restart: unless-stopped
  healthcheck:
    test:
      - CMD-SHELL
      - "curl -fsS http://localhost:4242/n3ur0n/v0/health >/dev/null"
    interval: 5s
    timeout: 3s
    retries: 6
    start_period: 5s
  networks:
    - n3uronnet

services:
  node-a:
    <<: *node
    container_name: n3uron-node-a
    hostname: node-a
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      N3UR0N_ENDPOINT: http://node-a:4242
      # node-a runs the local planner: a 7B/8B model on the host's Ollama.
      N3UR0N_PLANNER_MODE: llm
      N3UR0N_PLANNER_LLM_BASE_URL: ${PLANNER_BASE_URL:-http://host.docker.internal:11434}
      N3UR0N_PLANNER_LLM_MODEL: ${PLANNER_MODEL:-llama3.1:8b}
      RUST_LOG: info,n3ur0n=debug
    ports:
      - "4242:4242"
    volumes:
      - node-a-data:/var/lib/n3ur0n

  node-b:
    <<: *node
    container_name: n3uron-node-b
    hostname: node-b
    depends_on:
      node-a:
        condition: service_healthy
    environment:
      N3UR0N_ENDPOINT: http://node-b:4242
      N3UR0N_BACKEND: utility
      N3UR0N_BOOTSTRAP_PEERS: http://node-a:4242
      RUST_LOG: info,n3ur0n=debug
    ports:
      - "4243:4242"
    volumes:
      - node-b-data:/var/lib/n3ur0n

  node-c:
    <<: *node
    container_name: n3uron-node-c
    hostname: node-c
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      N3UR0N_ENDPOINT: http://node-c:4242
      N3UR0N_BACKEND: ollama
      N3UR0N_OPENAI_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      N3UR0N_OPENAI_MODEL: ${OLLAMA_MODEL:-qwen2.5:0.5b}
      RUST_LOG: info,n3ur0n=debug
    ports:
      - "4244:4242"
    volumes:
      - node-c-data:/var/lib/n3ur0n

networks:
  n3uronnet:
    driver: bridge

volumes:
  node-a-data:
  node-b-data:
  node-c-data:
