# 4-node N3UR0N test cluster.
#
# Usage:
#   docker compose -f docker/compose.yml up --build
#   docker compose -f docker/compose.yml exec node-a \
#       n3ur0n send --endpoint http://node-b:4242 --verb ping
#
# Nodes:
#   node-a — planner (PlanExec), llama3.1:8b on host Ollama (port 4242)
#   node-b — utility backend (4 caps, port 4243)
#   node-c — chat cap via host Ollama llama3.1:8b (port 4244)
#   node-d — chat cap via remote Ollama gpt-oss:20b on LAN (port 4245)
#
# Each node has its own persistent volume so its identity survives restarts.

name: n3ur0n-cluster

x-node: &node
  build:
    context: ..
    dockerfile: docker/Dockerfile
  image: n3ur0n:dev
  restart: unless-stopped
  healthcheck:
    test:
      - CMD-SHELL
      - "curl -fsS http://localhost:4242/n3ur0n/v0/health >/dev/null"
    interval: 5s
    timeout: 3s
    retries: 6
    start_period: 5s
  networks:
    - n3uronnet

services:
  node-a:
    <<: *node
    container_name: n3uron-node-a
    hostname: node-a
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      N3UR0N_ENDPOINT: http://node-a:4242
      # node-a runs the local planner: a 7B/8B model on the host's Ollama.
      # plan_exec: LLM compiles a typed plan upfront, deterministic executor
      # walks it. Override with PLANNER_MODE=llm to use the older ReAct loop.
      N3UR0N_PLANNER_MODE: ${PLANNER_MODE:-plan_exec}
      N3UR0N_PLANNER_LLM_BASE_URL: ${PLANNER_BASE_URL:-http://host.docker.internal:11434}
      N3UR0N_PLANNER_LLM_MODEL: ${PLANNER_MODEL:-llama3.1:8b}
      RUST_LOG: info,n3ur0n=debug
    ports:
      - "4242:4242"
    volumes:
      - node-a-data:/var/lib/n3ur0n

  node-b:
    <<: *node
    container_name: n3uron-node-b
    hostname: node-b
    depends_on:
      node-a:
        condition: service_healthy
    environment:
      N3UR0N_ENDPOINT: http://node-b:4242
      N3UR0N_BACKEND: utility
      N3UR0N_BOOTSTRAP_PEERS: http://node-a:4242
      RUST_LOG: info,n3ur0n=debug
    ports:
      - "4243:4242"
    volumes:
      - node-b-data:/var/lib/n3ur0n

  node-c:
    <<: *node
    container_name: n3uron-node-c
    hostname: node-c
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      node-a:
        condition: service_healthy
    environment:
      N3UR0N_ENDPOINT: http://node-c:4242
      N3UR0N_BACKEND: ollama
      N3UR0N_OPENAI_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      N3UR0N_OPENAI_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      N3UR0N_BOOTSTRAP_PEERS: http://node-a:4242
      RUST_LOG: info,n3ur0n=debug
    ports:
      - "4244:4242"
    volumes:
      - node-c-data:/var/lib/n3ur0n

  # node-d: chat publisher backed by a *remote* LAN Ollama running
  # gpt-oss:20b. Useful as a larger-model peer for the planner to route
  # demanding prompts to. Override endpoint/model via env if needed.
  node-d:
    <<: *node
    container_name: n3uron-node-d
    hostname: node-d
    depends_on:
      node-a:
        condition: service_healthy
    environment:
      N3UR0N_ENDPOINT: http://node-d:4242
      N3UR0N_BACKEND: ollama
      N3UR0N_OPENAI_BASE_URL: ${REMOTE_OLLAMA_BASE_URL:-http://192.168.4.101:11435}
      N3UR0N_OPENAI_MODEL: ${REMOTE_OLLAMA_MODEL:-gpt-oss:20b}
      N3UR0N_BOOTSTRAP_PEERS: http://node-a:4242
      RUST_LOG: info,n3ur0n=debug
    ports:
      - "4245:4242"
    volumes:
      - node-d-data:/var/lib/n3ur0n

  # node-e: manifest mode (v0.3). Loads capabilities from cap.toml files
  # mounted from the host. Demonstrates the binding-driven runtime path.
  node-e:
    <<: *node
    container_name: n3uron-node-e
    hostname: node-e
    depends_on:
      node-a:
        condition: service_healthy
    environment:
      N3UR0N_ENDPOINT: http://node-e:4242
      N3UR0N_MANIFEST_DIR: /etc/n3ur0n/manifests
      N3UR0N_BOOTSTRAP_PEERS: http://node-a:4242
      RUST_LOG: info,n3ur0n=debug
    ports:
      - "4246:4242"
    volumes:
      - node-e-data:/var/lib/n3ur0n
      - ${N3UR0N_MANIFEST_HOST_DIR:-/tmp/n3manifest}:/etc/n3ur0n/manifests:ro

networks:
  n3uronnet:
    driver: bridge

volumes:
  node-a-data:
  node-b-data:
  node-c-data:
  node-d-data:
  node-e-data:
