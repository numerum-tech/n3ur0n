name: Release

# Triggered when a tag like `v0.4.0` is pushed. Builds server binaries
# for Linux/macOS/Windows, a Docker image to ghcr.io, and desktop
# installers (.dmg, .msi, .AppImage, .deb) via tauri-action — all
# attached to the GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.4.0)"
        required: true

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Draft GitHub release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
      release_id: ${{ steps.create.outputs.id }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true

  server-binaries:
    name: server / ${{ matrix.label }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            artifact: n3ur0n
            asset: n3ur0n-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            artifact: n3ur0n
            asset: n3ur0n-linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
            artifact: n3ur0n
            asset: n3ur0n-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
            artifact: n3ur0n
            asset: n3ur0n-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            artifact: n3ur0n.exe
            asset: n3ur0n-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compile toolchain (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
      - name: Build server binary
        run: cargo build --release --bin n3ur0n -p n3ur0n-server --target ${{ matrix.target }}
      - name: Rename artefact
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.artifact }} ${{ matrix.asset }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: ${{ matrix.asset }}

  docker-image:
    name: docker / ghcr.io
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ needs.create-release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.create-release.outputs.tag }}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  desktop-installers:
    name: desktop / ${{ matrix.label }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-universal
            target: universal-apple-darwin
            tauri_args: "--target universal-apple-darwin"
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            tauri_args: ""
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            tauri_args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Tauri Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      - name: Install macOS universal target
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/desktop -> target"
      - name: Build desktop installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/desktop
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseName: ${{ needs.create-release.outputs.tag }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}

  publish-release:
    name: Publish release
    needs: [server-binaries, docker-image, desktop-installers, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          draft: false
