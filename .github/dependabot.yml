version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      tokio-stack:
        patterns: ["tokio*", "tower*", "axum*", "hyper*"]
      crypto:
        patterns: ["ed25519-dalek", "sha2", "rustls*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: monthly
