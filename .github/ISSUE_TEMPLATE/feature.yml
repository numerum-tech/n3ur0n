name: Feature request
description: Propose a new feature or improvement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case before describing the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This change does not touch the four protocol verbs.
        - label: This change does not weaken signature/identity guarantees.
        - label: I have read CONTRIBUTING.md.
