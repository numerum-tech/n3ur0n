# N3UR0N — nginx front for n3ur0n.net (HTTP only)
#
# Port 80 only. Run certbot afterwards; it will rewrite TLS / 443 blocks, e.g.:
#   certbot --nginx -d n3ur0n.net -d www.n3ur0n.net -d seed.n3ur0n.net
#
# Host layout:
#   n3ur0n.net / www.n3ur0n.net  → static one-pager (www/)
#   seed.n3ur0n.net              → publisher (protocol paths only)
#
# Install (Debian/Ubuntu-style):
#   sudo cp deploy/nginx/n3ur0n.net.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/n3ur0n.net.conf /etc/nginx/sites-enabled/
#   # Point root path, then: nginx -t && systemctl reload nginx
#
# Local backends:
#   www/ under root below
#   n3ur0n serve --port 4242 --endpoint https://seed.n3ur0n.net
#
# Bootstrap (after TLS):
#   --bootstrap https://seed.n3ur0n.net
#   N3UR0N_BOOTSTRAP_PEERS=https://seed.n3ur0n.net

# Shared rate-limit zones (http context). Drop if already defined elsewhere.
limit_req_zone  $binary_remote_addr zone=www_req:10m  rate=20r/s;
limit_req_zone  $binary_remote_addr zone=seed_req:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=seed_conn:10m;

# CORS allow-list for the seed health badge on the project site.
# Reflects the Origin only for our own hosts; empty (no CORS) otherwise.
map $http_origin $cors_seed_origin {
    default                    "";
    "https://n3ur0n.net"       $http_origin;
    "https://www.n3ur0n.net"   $http_origin;
}

# ---------------------------------------------------------------------------
# Project site
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name n3ur0n.net www.n3ur0n.net;

    # Leave this so certbot / ACME http-01 can succeed before TLS exists
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        allow all;
    }

    root /var/www/n3ur0n.net/www;
    index index.html;

    limit_req zone=www_req burst=40 nodelay;

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location ~* \.(css|png|ico|svg|webp|woff2)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# ---------------------------------------------------------------------------
# Bootstrap seed peer — protocol only
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name seed.n3ur0n.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        allow all;
    }

    # Large blob uploads / downloads
    client_max_body_size 64m;
    proxy_read_timeout  180s;
    proxy_send_timeout  180s;
    proxy_connect_timeout 5s;

    limit_req  zone=seed_req  burst=30 nodelay;
    limit_conn seed_conn 20;

    # Protocol surface only — no /ui, no /api/v0
    location /n3ur0n/v0/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:4242;
    }

    location = /n3ur0n/v0/health {
        access_log off;
        # Allow the project site's status badge to read health cross-origin.
        add_header Access-Control-Allow-Origin $cors_seed_origin always;
        add_header Vary Origin always;
        proxy_pass http://127.0.0.1:4242;
        proxy_set_header Host $host;
    }

    # Everything else on the seed hostname stays dark
    location / {
        return 404;
    }
}
