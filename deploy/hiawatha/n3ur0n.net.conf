# N3UR0N — Hiawatha front for n3ur0n.net (alternative to nginx)
#
# Why consider Hiawatha: built-in BanOn* / ConnectionsPerIP DoS controls
# without extra modules. Still pure HTTP(S) reverse proxy — no TCP needed.
#
# Docs: https://www.hiawatha-webserver.org/manpages/hiawatha
#
# Layout (same as nginx):
#   n3ur0n.net / www.n3ur0n.net → static www/
#   seed.n3ur0n.net             → n3ur0n on 127.0.0.1:4242, /n3ur0n/v0 only
#
# Drop into /etc/hiawatha/hiawatha.conf (or Include this file), adjust paths,
# then: hiawatha -k && systemctl restart hiawatha
#
# Local backends:
#   root below = deployed www/
#   n3ur0n serve --port 4242 --endpoint https://seed.n3ur0n.net

# --- Global hardening (tune to taste) ---------------------------------------
ConnectionsTotal = 1000
ConnectionsPerIP = 25
# Ban after too many connections from one IP
BanOnMaxPerIP = 50
# Ban after N requests in IntervalSeconds
BanOnMaxReqPerInterval = 120 10
BanOnWrongPassword = 5
BanOnGarbage = yes
BanOnFlooding = 20/1:15   # 20 req/s → 15 min ban (Hiawatha flood syntax)
KickOnBan = yes
RebanDuringBan = yes

# TLS (Let's Encrypt paths — or your PEM directory)
Binding {
    Port = 80
    Interface = 0.0.0.0
    MaxKeepAlive = 50
}

Binding {
    Port = 443
    Interface = 0.0.0.0
    MaxKeepAlive = 50
    TLScertFile = /etc/letsencrypt/live/n3ur0n.net/fullchain.pem
    TLSkeyFile = /etc/letsencrypt/live/n3ur0n.net/privkey.pem
}

# ACME challenges (shared)
Directory {
    Path = /.well-known/acme-challenge
    AccessList = allow all
}

# ---------------------------------------------------------------------------
# Project site
# ---------------------------------------------------------------------------
VirtualHost {
    Hostname = n3ur0n.net, www.n3ur0n.net
    WebsiteRoot = /var/www/n3ur0n.net/www
    StartFile = index.html
    AccessLog = /var/log/hiawatha/n3ur0n.net-access.log
    ErrorLog = /var/log/hiawatha/n3ur0n.net-error.log
    RequireTLS = yes
    # www → apex (Hiawatha 11+: use UrlToolkit or a tiny redirect vhost)
}

# Optional redirect vhost if you prefer apex-only
# VirtualHost {
#     Hostname = www.n3ur0n.net
#     WebsiteRoot = /var/www/n3ur0n.net/www
#     RequireTLS = yes
#     # ExternalRedirect https://n3ur0n.net
# }

# ---------------------------------------------------------------------------
# Seed peer — reverse-proxy protocol paths only
# ---------------------------------------------------------------------------
VirtualHost {
    Hostname = seed.n3ur0n.net
    # Placeholder root; real traffic goes through ReverseProxy
    WebsiteRoot = /var/www/n3ur0n.net/seed-empty
    StartFile = index.html
    AccessLog = /var/log/hiawatha/seed-access.log
    ErrorLog = /var/log/hiawatha/seed-error.log
    RequireTLS = yes

    # Tighter per-vhost limits for a public peer
    ConnectionsPerIP = 15
    BanOnMaxReqPerInterval = 60 10

    # Only protocol surface. Timeout seconds = last numeric arg (blob-friendly).
    # keep-alive preserves connections to the local axum listener.
    ReverseProxy /n3ur0n/v0 http://127.0.0.1:4242/n3ur0n/v0 180 keep-alive

    # No ReverseProxy for /ui or /api/v0 → Hiawatha serves (empty) root → 404
}

# Empty dir for seed WebsiteRoot:
#   mkdir -p /var/www/n3ur0n.net/seed-empty
#   printf 'Not found\n' > /var/www/n3ur0n.net/seed-empty/index.html
